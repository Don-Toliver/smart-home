<!DOCTYPE html>
<html>
<head>
<title>Home Automation</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  text-align:center;
}

.container{
  margin-top:50px;
}

.card{
  background:white;
  width:300px;
  margin:20px auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0px 0px 10px #ccc;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:5px;
  font-size:16px;
  cursor:pointer;
}

.on{
  background:green;
  color:white;
}

.off{
  background:red;
  color:white;
}
</style>

</head>

<body>

<h1>🏠 ESP32 Home Automation</h1>

<div class="container">

<div class="card">
<h2>💡 Light</h2>
<button class="on" onclick="lightOn()">ON</button>
<button class="off" onclick="lightOff()">OFF</button>
</div>

<div class="card">
<h2>🌀 Fan</h2>
<button class="on" onclick="fanOn()">ON</button>
<button class="off" onclick="fanOff()">OFF</button>
</div>

<div class="card">
<h2>🌀 Ac</h2>
<button class="on" onclick="AcOn()">ON</button>
<button class="off" onclick="AcOff()">OFF</button>
</div>


<div class="card">
<h2>🌀 Gas</h2>
<button class="on" onclick="GasOn()">ON</button>
<button class="off" onclick="GasOff()">OFF</button>
</div>



</div>

<script>

const apiKey = "CTYQT9JJAF76S2M4";

function lightOn(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field1=0");
  alert("Light ON");
}

function lightOff(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field1=0");
  alert("Light OFF");
}

function fanOn(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field2=0");
  alert("Fan ON");
}

function fanOff(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field2=0");
  alert("Fan OFF");
}
function AcOn(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field3=0");
  alert("Ac ON");
}

function Acoff(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field3=0");
  alert("Ac OFF");
}
function GasOn(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field4=0");
  alert("Gas ON");
}

function Gasoff(){
  fetch("https://api.thingspeak.com/update?api_key=CTYQT9JJAF76S2M4&field4=0");
  alert("Gas OFF");

</script>

</body>
</html>
